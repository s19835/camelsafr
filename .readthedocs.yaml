- name: Read The Docs Helper
  uses: KengoTODA/readthedocs-action@v2.0.30
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - xarray
    - requirements: docs/requirements.txt
